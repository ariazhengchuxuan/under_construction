<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envisioning Climate Change</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --blue: #1e4d6b;
            --blue-mid: #2e6e96;
            --blue-light: #5a9ab8;
            --blue-pale: #e8f3f8;
            --green: #2a6b52;
            --green-light: #4a9678;
            --green-pale: #e6f2ed;
            --white: #ffffff;
            --bg: #f4f8fb;
            --ink: #1a2a34;
            --ink-mid: #4a5e6a;
            --ink-light: #8aa0ae;
            --rule: rgba(30, 77, 107, 0.12);
            --shadow-sm: 0 1px 4px rgba(30, 77, 107, 0.07);
            --shadow-md: 0 6px 24px rgba(30, 77, 107, 0.11);

            /* legacy aliases */
            --primary: var(--blue);
            --primary-mid: var(--blue-mid);
            --secondary: var(--blue-light);
            --accent: #c0531e;
            --accent-light: #d4724a;
            --hope-green: var(--green);
            --teal: #2a7272;
            --water: #8ec6de;
            --warm: #c4883a;
            --sky: #6aaec6;
            --bg-light: var(--bg);
            --bg-white: var(--white);
            --text: var(--ink);
            --text-medium: var(--ink-mid);
            --text-light: var(--ink-light);
            --border: var(--rule);
            --ink-rule: var(--rule);
            --shadow-lg: 0 16px 48px rgba(30, 77, 107, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            line-height: 1.18;
        }

        /* ── NAV ── */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(244, 248, 251, 0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid var(--rule);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 62px;
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: -0.01em;
        }

        .nav-links {
            display: flex;
            gap: 0.15rem;
            align-items: center;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-medium);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            white-space: nowrap;
            transition: color 0.2s, background 0.2s;
        }

        .nav-link:hover {
            color: var(--primary);
            background: rgba(26, 74, 107, 0.07);
        }

        .nav-link-arrow {
            font-size: 0.6rem;
            opacity: 0.45;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .nav-item:hover .nav-link-arrow {
            transform: rotate(180deg);
        }

        .nav-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: white;
            min-width: 255px;
            box-shadow: 0 12px 40px rgba(26, 74, 107, 0.14), 0 2px 8px rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(26, 74, 107, 0.09);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
            padding: 0.4rem;
        }

        .nav-item:hover .nav-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .nav-dropdown-item {
            padding: 0.6rem 1rem;
            color: var(--text-medium);
            display: block;
            transition: all 0.15s;
            font-size: 0.875rem;
            cursor: pointer;
            border-radius: 8px;
        }

        .nav-dropdown-item:hover {
            background: rgba(26, 74, 107, 0.06);
            color: var(--primary);
        }

        .nav-sub-item {
            position: relative;
        }

        .nav-sub-item>.nav-dropdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-sub-item>.nav-dropdown-item::after {
            content: '›';
            font-size: 1rem;
            color: var(--text-light);
            margin-left: 0.5rem;
        }

        .nav-sub-dropdown {
            position: absolute;
            top: 0;
            right: 100%;
            left: auto;
            margin-right: 4px;
            background: white;
            min-width: 205px;
            box-shadow: 0 12px 40px rgba(26, 74, 107, 0.14), 0 2px 8px rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(26, 74, 107, 0.09);
            opacity: 0;
            visibility: hidden;
            transform: translateX(8px);
            transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
            padding: 0.4rem;
        }

        .nav-sub-item:hover .nav-sub-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        /* ── PROGRESS ── */
        .progress-indicator {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.3s;
        }

        .progress-dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 4px;
        }

        /* ── FOOTER ── */
        .footer {
            background: linear-gradient(135deg, #0f2a3f 0%, #1a4a6b 60%, #0d3d5a 100%);
            padding: 3.5rem 2rem;
            margin-top: 5rem;
            position: relative;
            overflow: hidden;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(93, 183, 212, 0.12) 0%, transparent 70%);
        }

        .footer::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: 10%;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 98, 42, 0.1) 0%, transparent 70%);
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .footer-nav {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            flex-wrap: wrap;
        }

        .footer-nav-link {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.95rem;
            transition: color 0.2s;
            cursor: pointer;
        }

        .footer-nav-link:hover {
            color: var(--water);
        }

        .footer-copyright {
            text-align: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .footer-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            flex-wrap: wrap;
        }

        .footer-logos img {
            height: 52px;
            max-width: 140px;
            object-fit: contain;
            opacity: 0.6;
            filter: brightness(0) invert(1);
            transition: opacity 0.2s, transform 0.2s;
        }

        .footer-logos img:hover {
            opacity: 1;
            transform: scale(1.06);
        }

        /* ── LANDING ── */
        .landing {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6rem 2rem 4rem;
            background: var(--bg);
        }

        .landing-content {
            max-width: 860px;
            text-align: center;
        }

        /* ── SCENARIO & METHODS ── */
        .scenario-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        .scenario-page h1 {
            font-size: 2.6rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }

        .scenario-page h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .intro-text {
            font-size: 1.1rem;
            margin-bottom: 3rem;
            max-width: 800px;
            color: var(--text-medium);
            line-height: 1.75;
        }

        .comparison-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .scenario-card {
            background: var(--bg-white);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .scenario-card:hover {
            border-color: var(--primary-mid);
            box-shadow: var(--shadow-md);
            transform: translateY(-3px);
        }

        .scenario-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .scenario-card.inaction h3 {
            color: var(--accent);
        }

        .scenario-card.action h3 {
            color: var(--hope-green);
        }

        .damage-image-container {
            margin: 2rem 0;
            text-align: center;
        }

        .damage-image {
            width: 100%;
            max-width: 600px;
            height: 300px;
            background: var(--bg-light);
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            font-style: italic;
            margin: 0 auto;
            border-radius: 12px;
        }

        .damage-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .image-caption {
            font-size: 0.88rem;
            color: var(--text-medium);
            margin-top: 0.75rem;
            font-style: italic;
        }

        /* ── TEAM ── */
        .team-page {
            max-width: 1300px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        .team-page h1 {
            font-size: 3rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 1rem;
        }

        .team-intro {
            text-align: center;
            font-size: 1.15rem;
            color: var(--text-medium);
            max-width: 800px;
            margin: 0 auto 4rem;
            line-height: 1.8;
        }

        .team-section {
            margin-bottom: 4.5rem;
        }

        .team-section-title {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 2.5rem;
            text-align: center;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(58, 140, 110, 0.3);
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 3rem;
        }

        .team-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            border: 1px solid var(--border);
        }

        .team-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: rgba(26, 74, 107, 0.25);
        }

        .team-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 1.25rem auto 0;
            overflow: hidden;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: 3px solid rgba(26, 74, 107, 0.1);
        }

        .team-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .team-info {
            padding: 0.85rem 1.1rem 1.1rem;
            text-align: center;
        }

        .team-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .team-role {
            font-size: 0.82rem;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .team-affiliation {
            font-size: 0.75rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ── METHODS ── */
        .methods-page {
            max-width: 860px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        .methods-page h1 {
            font-size: 2.4rem;
            color: var(--primary);
            margin-bottom: 2.5rem;
        }

        .methods-page h2 {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.68rem;
            color: var(--ink-light);
            margin-bottom: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .methods-section {
            margin-bottom: 1.75rem;
            padding: 1.75rem 2rem;
            background: var(--bg-white);
            border-radius: 3px;
            border: 1px solid var(--ink-rule);
        }

        .methods-section p {
            color: var(--ink-mid);
            line-height: 1.8;
            margin-bottom: 0.9rem;
            font-size: 0.965rem;
        }

        .methods-section p:last-child {
            margin-bottom: 0;
        }

        .methods-section ul {
            margin: 1rem 0;
            padding-left: 1.5rem;
        }

        .methods-section li {
            margin-bottom: 0.55rem;
            color: var(--ink-mid);
            line-height: 1.7;
            font-size: 0.965rem;
        }

        .explanation-box {
            background: rgba(46, 106, 84, 0.04);
            padding: 1.25rem 1.5rem;
            margin: 1.5rem 0;
            border-left: 2px solid var(--hope-green);
        }

        .explanation-box h4 {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.68rem;
            margin-bottom: 0.5rem;
            color: var(--hope-green);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .highlight-box {
            background: rgba(26, 26, 24, 0.03);
            padding: 1.25rem 1.5rem;
            margin: 1.5rem 0;
            border-left: 2px solid var(--ink-light);
        }

        .highlight-box p {
            font-size: 1rem;
            color: var(--ink);
            font-style: italic;
        }

        /* ── NAV BUTTONS ── */
        .nav-buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 4rem;
            flex-wrap: wrap;
        }

        .nav-button {
            padding: 0.7rem 1.75rem;
            font-size: 0.85rem;
            font-weight: 500;
            background: var(--blue);
            color: white;
            border: 1px solid var(--blue);
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
            min-width: 150px;
            letter-spacing: 0.02em;
            font-family: 'DM Sans', sans-serif;
        }

        .nav-button:hover {
            opacity: 0.82;
        }

        .nav-button.prev {
            background: transparent;
            color: var(--blue);
            border: 1px solid var(--rule);
        }

        .nav-button.prev:hover {
            background: var(--white);
            border-color: var(--blue);
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* ── HAMBURGER ── */
        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 6px;
            background: none;
            border: none;
        }

        .nav-hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--blue);
            border-radius: 2px;
            transition: all 0.3s;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 860px) {
            .nav-links {
                display: none;
            }

            .nav-hamburger {
                display: flex !important;
            }

            .nav-content {
                padding: 0 1.25rem;
            }

            .nav-links.open {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 62px;
                left: 0;
                right: 0;
                background: white;
                border-bottom: 1px solid var(--border);
                box-shadow: 0 12px 32px rgba(26, 74, 107, 0.1);
                padding: 0.5rem 0 1rem;
                gap: 0;
                animation: fadeIn 0.2s ease;
            }

            .nav-item {
                width: 100%;
            }

            .nav-link {
                font-size: 0.95rem;
                padding: 0.75rem 1.5rem;
                border-radius: 0;
                justify-content: space-between;
                border-bottom: 1px solid rgba(26, 74, 107, 0.05);
                background: none !important;
            }

            .nav-link:hover {
                background: rgba(26, 74, 107, 0.04) !important;
            }

            .nav-dropdown {
                position: static !important;
                opacity: 1 !important;
                visibility: visible !important;
                transform: none !important;
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                min-width: unset !important;
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                background: rgba(26, 74, 107, 0.025) !important;
            }

            .nav-dropdown-item {
                padding: 0.6rem 1.5rem 0.6rem 2.5rem;
                font-size: 0.875rem;
                border-radius: 0;
                border-bottom: 1px solid rgba(26, 74, 107, 0.04);
            }

            .nav-sub-dropdown {
                position: static !important;
                opacity: 1 !important;
                visibility: visible !important;
                transform: none !important;
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                min-width: unset !important;
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                background: rgba(26, 74, 107, 0.04) !important;
            }

            .nav-sub-dropdown .nav-dropdown-item {
                padding-left: 3.5rem;
                font-size: 0.84rem;
            }

            .nav-sub-item>.nav-dropdown-item::after {
                content: '';
            }
        }

        @media (max-width: 968px) {
            .comparison-container {
                grid-template-columns: 1fr;
            }

            .team-grid {
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            }
        }

        @media (max-width: 640px) {
            .landing-statement {
                font-size: 1.1rem;
            }

            .team-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .scenario-page,
            .methods-page,
            .team-page {
                padding: 7rem 1rem 3rem;
            }

            .methods-section {
                padding: 1.5rem;
            }
        }
    </style>

</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function Navigation({ currentPage }) {
            const { useState: useLocalState, useEffect } = React;
            const [menuOpen, setMenuOpen] = useLocalState(false);
            const [openSection, setOpenSection] = useLocalState(null);
            const [openSub, setOpenSub] = useLocalState(null);

            const isMobile = () => window.innerWidth <= 860;

            // Close menu on resize to desktop
            useEffect(() => {
                const onResize = () => { if (!isMobile()) { setMenuOpen(false); setOpenSection(null); setOpenSub(null); } };
                window.addEventListener('resize', onResize);
                return () => window.removeEventListener('resize', onResize);
            }, []);

            const navigate = (page) => {
                window.location.hash = page === 'home' ? '' : `#${page}`;
                setMenuOpen(false);
                setOpenSection(null);
                setOpenSub(null);
            };

            const toggleSection = (key) => {
                setOpenSection(prev => prev === key ? null : key);
                setOpenSub(null);
            };

            const toggleSub = (e, key) => {
                e.stopPropagation();
                setOpenSub(prev => prev === key ? null : key);
            };

            // On mobile: show/hide via state; on desktop: CSS hover handles it (no inline style)
            const mobileDropStyle = (key) => isMobile()
                ? { display: openSection === key ? 'block' : 'none' }
                : {};
            const mobileSubStyle = (key) => isMobile()
                ? { display: openSub === key ? 'block' : 'none' }
                : {};

            const DownArrow = () => (
                <svg className="nav-link-arrow" width="10" height="6" viewBox="0 0 10 6" fill="none" style={{ flexShrink: 0 }}>
                    <path d="M1 1l4 4 4-4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
            );

            // Hamburger animated icon
            const HamburgerIcon = () => (
                <button
                    className="nav-hamburger"
                    onClick={() => { setMenuOpen(o => !o); setOpenSection(null); setOpenSub(null); }}
                    aria-label={menuOpen ? 'Close menu' : 'Open menu'}
                >
                    <span style={{ transform: menuOpen ? 'rotate(45deg) translate(5px, 5px)' : 'none' }} />
                    <span style={{ opacity: menuOpen ? 0 : 1, transform: menuOpen ? 'scaleX(0)' : 'none' }} />
                    <span style={{ transform: menuOpen ? 'rotate(-45deg) translate(5px, -5px)' : 'none' }} />
                </button>
            );

            return (
                <nav className="nav" style={{ position: 'fixed' }}>
                    <div className="nav-content">
                        <div className="nav-logo" onClick={() => navigate('home')}>
                            Envisioning Climate Change
                        </div>

                            <p>The Don River drains an area of about 1,200 square kilometers in southern Ontario, falling about 250 meters in the 60 kilometers from its source as it makes its way into Lake Ontario.</p>

                            <p>In 1886, the city of Toronto initiated the <a href="https://jenniferbonnell.com/books-publications/reclaiming-the-don/" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--primary)' }}>"Don River Improvement Plan"</a>. Concerns that led to this Plan were threefold: public health dangers from urban wastes including sewage in the river, damage from floods, and impediments to Lake Ontario shipping from silt build-up erroneously attributed to the river. The plan was to widen, deepen, and straighten the river channel in the last 2 kilometers before it reached the lake. Additional benefits from the plan were intended to be allowing ships to come up the river and railroad tracks on both banks of the river.</p>

        function FloodModellingPage() {
            return (
                <>
                    <div className="methods-page">
                        <h1>Modelling and Visualizing Floods</h1>
                        <div className="methods-section">
                            <p>Our work proceeds as a series of case studies. The locations we study have experienced one or several instances of severe flooding and have gathered reliable data with which to calibrate and validate our models. The situations can be used to illustrate the difference in plausible future flooding based on the degree to which there is inaction (making future floods worse) or constructive actions (making the damage from future floods less severe).</p>
                            <p>This website reports on our first case studies, <a href="#don-river" style={{ color: 'var(--primary)' }}>flooding at the mouth of the Don River (Toronto)</a>, and <a href="#etobicoke" style={{ color: 'var(--primary)' }}>flooding of the Little Etobicoke Creek (Mississauga)</a>.</p>
                        </div>
                        <div className="methods-section">
                            <h2>Flood Modelling Systems</h2>
                            <p>Past flooding is reproduced mathematically by modelling the flood in one of a set of computer systems for doing this. Thus far, we have used in our work both <a href="https://www.esri.com/content/dam/esrisites/en-us/media/technical-papers/flood-simulation-arcgis-pro.pdf" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--primary)' }}>ESRI ArcGIS</a> and the <a href="https://www.civilgeo.com/the-road-to-hec-ras/" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--primary)' }}>U.S. Army's HEC-RAS</a>.</p>
                        </div>
                        <div className="methods-section">
                            <h2>Model Inputs</h2>
                            <p>Data used as input to a flood model includes:</p>
                            <ul>
                                <li>Topography;</li>
                                <li>Land surface characteristics such as rivers and streams, dams and culverts;</li>
                                <li>Underground streams and drainage systems; and</li>
                                <li>Absorptive properties of structures on the ground such as building rooftops and parking lots.</li>
                            </ul>
                            <p>Models are driven by data on the water that comes from sources such as rainfall, tides, rising sea levels, and ocean surges. Models output descriptions of water flowing with varying velocities over landscapes over periods of time. If strong enough, these water flows are floods.</p>
                        </div>
                        <div className="methods-section">
                            <h2>Future Projections</h2>
                            <p>Once we can reproduce past flooding, we can use the model to imagine, project, and visualize future climate scenarios.</p>
                            <p>Climate change continues to pump more greenhouse gases into the atmosphere and increase the earth's surface temperature. Rainfall becomes worse because there is more moisture in the atmosphere. Storms become worse and more unpredictable because of greater numbers of events such as rainstorms, hurricanes, typhoons, and tsunamis.</p>
                            <p>On the other hand, concrete actions can be undertaken. Some actions affect the speed of climate change. These include decreasing our reliance on fossil fuels, increasing the use of electric vehicles, slowing the destruction of forests, substituting electronic communications for travel, and eating less meat. Other actions are specific to flood prevention. These include reengineering rivers and how they flow; increasing the capacity of drainage systems; constructing barriers to the flow of water such as dams and levees; and modifying the absorptive qualities of upstream land features.</p>
                            <p>We believe (and will gather evidence as one of our research activities) that such modelling and visualizing exercises will give people a greater sense of agency with respect to climate change and the vagaries of extreme weather, and will be a tool to enable more open, thoughtful, and constructive policy deliberations.</p>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

            return (
                <div>
                    <Navigation currentPage={page} />
                    {page === 'home' && <LandingPage />}
                    {page === 'climate-change' && <ComingSoonPage title="Climate Change" />}
                    {page === 'extreme-weather' && <ComingSoonPage title="Extreme Weather" />}
                    {page === 'climate-fuels' && <ComingSoonPage title="How Climate Change Fuels Extreme Weather" />}
                    {page === 'methodology' && <MethodologyPage onPrev={goHome} onRestart={goHome} />}
                    {page === 'flood-modelling' && <FloodModellingPage />}
                    {page === 'wildfire-modelling' && <ComingSoonPage title="Modelling and Visualizing Wildfires" />}
                    {page === 'don-river' && <DonRiver onNext={() => goTo('etobicoke')} onPrev={goHome} />}
                    {page === 'don-river-problem' && <DonRiverProblem />}
                    {page === 'don-river-solution' && <DonRiverSolution />}
                    {page === 'don-river-viz' && <DonRiverViz />}
                    {page === 'etobicoke' && <Etobicoke onNext={() => goTo('team')} onPrev={() => goTo('don-river')} />}
                    {page === 'etobicoke-problem' && <ComingSoonPage title="Etobicoke Creek — The Problem" />}
                    {page === 'etobicoke-solution' && <ComingSoonPage title="Etobicoke Creek — A Proposed Solution" />}
                    {page === 'etobicoke-viz' && <ComingSoonPage title="Etobicoke Creek — Visualizations" />}
                    {page === 'north-rustico' && <ComingSoonPage title="North Rustico Flooding (Prince Edward Island)" />}
                    {page === 'fort-mcmurray' && <ComingSoonPage title="Fort McMurray Wildfire (Alberta)" />}
                    {page === 'team' && <TeamPage onNext={() => goTo('methodology')} onPrev={() => goTo('etobicoke')} />}
                    {page === 'partners' && <PartnersPage />}
                    {page === 'sponsors' && <SponsorsPage />}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
