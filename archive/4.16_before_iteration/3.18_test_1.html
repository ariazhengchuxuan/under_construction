<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envisioning Climate Futures</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --blue: #163f59;
            --blue-mid: #215a7f;
            --blue-light: #4889b0;
            --blue-pale: #eaf1f5;
            --green: #1d5b43;
            --green-light: #358c6b;
            --green-pale: #e2f0ea;
            --white: #ffffff;
            --bg: #f9fbfd;
            --ink: #111e26;
            --ink-mid: #3d505c;
            --ink-light: #7c93a3;
            --rule: rgba(22, 63, 89, 0.08);
            --border: rgba(22, 63, 89, 0.08);
            --shadow-sm: 0 2px 8px rgba(22, 63, 89, 0.04);
            --shadow-md: 0 8px 30px rgba(22, 63, 89, 0.08);
            --shadow-lg: 0 20px 50px rgba(22, 63, 89, 0.12);
            --radius-md: 0px;
            --radius-lg: 0px;
            --primary: var(--blue);
            --primary-mid: var(--blue-mid);
            --secondary: var(--blue-light);
            --accent: #b54a16;
            --accent-light: #d6642d;
            --hope-green: var(--green);
            --teal: #1f6464;
            --water: #78bdd6;
            --warm: #b87b2e;
            --sky: #5d9fba;
            --bg-light: var(--bg);
            --bg-white: var(--white);
            --text: var(--ink);
            --text-medium: var(--ink-mid);
            --text-light: var(--ink-light);
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400;
            line-height: 1.1;
            font-style: italic;
            letter-spacing: 0.02em;
        }

        img,
        video,
        figure {
            border-radius: 0 !important;
        }

        /* NAV */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(244, 248, 251, 0.97);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid var(--rule);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 62px;
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: -0.01em;
        }

        .nav-links {
            display: flex;
            gap: 0.15rem;
            align-items: center;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-medium);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0.5rem 0.9rem;
            white-space: nowrap;
            transition: var(--transition-smooth);
        }

        .nav-link:hover {
            color: var(--primary);
            background: rgba(22, 63, 89, 0.05);
            transform: translateY(-1px);
        }

        .nav-link-arrow {
            font-size: 0.6rem;
            opacity: 0.45;
            transition: var(--transition-smooth);
            flex-shrink: 0;
        }

        .nav-item:hover .nav-link-arrow {
            transform: rotate(180deg) translateY(1px);
            opacity: 0.8;
            color: var(--primary);
        }

        .nav-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: white;
            min-width: 255px;
            box-shadow: 0 12px 40px rgba(26, 74, 107, 0.14), 0 2px 8px rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(26, 74, 107, 0.09);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
            padding: 0.4rem;
        }

        .nav-item:hover .nav-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .nav-dropdown-item {
            padding: 0.6rem 1rem;
            color: var(--text-medium);
            display: block;
            transition: all 0.15s;
            font-size: 0.875rem;
            cursor: pointer;
            border-radius: 8px;
        }

        .nav-dropdown-item:hover {
            background: rgba(26, 74, 107, 0.06);
            color: var(--primary);
        }

        .nav-sub-item {
            position: relative;
        }

        .nav-sub-item>.nav-dropdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-sub-item>.nav-dropdown-item::after {
            content: '›';
            font-size: 1rem;
            color: var(--text-light);
            margin-left: 0.5rem;
        }

        .nav-sub-dropdown {
            position: absolute;
            top: 0;
            right: 100%;
            left: auto;
            margin-right: 4px;
            background: white;
            min-width: 205px;
            box-shadow: 0 12px 40px rgba(26, 74, 107, 0.14), 0 2px 8px rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(26, 74, 107, 0.09);
            opacity: 0;
            visibility: hidden;
            transform: translateX(8px);
            transition: opacity 0.2s, transform 0.2s, visibility 0.2s;
            padding: 0.4rem;
        }

        .nav-sub-item:hover .nav-sub-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        /* FOOTER */
        .footer {
            background: linear-gradient(135deg, #0f2a3f 0%, #1a4a6b 60%, #0d3d5a 100%);
            padding: 3.5rem 2rem;
            margin-top: 5rem;
            position: relative;
            overflow: hidden;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(93, 183, 212, 0.12) 0%, transparent 70%);
        }

        .footer::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: 10%;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 98, 42, 0.1) 0%, transparent 70%);
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .footer-nav {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            flex-wrap: wrap;
        }

        .footer-nav-link {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.95rem;
            transition: color 0.2s;
            cursor: pointer;
        }

        .footer-nav-link:hover {
            color: var(--water);
        }

        .footer-copyright {
            text-align: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .footer-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            flex-wrap: wrap;
        }

        .footer-logos img {
            height: 52px;
            max-width: 140px;
            object-fit: contain;
            opacity: 0.6;
            filter: brightness(0) invert(1);
            transition: opacity 0.2s, transform 0.2s;
        }

        .footer-logos img:hover {
            opacity: 1;
            transform: scale(1.06);
        }

        /* LANDING */
        .landing {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6rem 2rem 4rem;
            background: var(--bg);
        }

        /* ── UNIVERSAL CONTENT PAGE ── */
        .content-page {
            max-width: 1040px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        .content-page h1 {
            font-size: 3.8rem;
            color: var(--primary);
            margin-bottom: 2.5rem;
        }

        /* Two-column block: label (left) + content (right) */
        .c-block {
            display: grid;
            grid-template-columns: 190px 1fr;
            border: none;
            border-bottom: 1px solid var(--rule, rgba(0,0,0,0.07));
            background: transparent;
            box-shadow: none;
        }

        .c-block.full {
            grid-template-columns: 1fr;
        }

        .c-block:last-of-type,
        .c-group .c-block:last-child {
            border-bottom: none;
        }

        .c-group {
            margin-bottom: 0.5rem;
        }

        .c-group .c-block {
            border-bottom: 1px solid var(--rule, rgba(0,0,0,0.07));
            margin-bottom: 0;
        }

        .c-group .c-block:last-child {
            border-bottom: none;
        }

        .c-label {
            padding: 2.25rem 1.5rem 2.25rem 0;
            border-right: none;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding-top: 2.5rem;
        }

        .c-label h2 {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.68rem;
            color: var(--accent);
            font-weight: 700;
            font-style: normal;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            line-height: 1.3;
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }

        .c-label h2::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 2.5px;
            background: var(--accent);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .c-content {
            padding: 2.25rem 0 2.25rem 2.25rem;
            border-left: none;
        }

        .c-content p {
            color: var(--ink-mid);
            line-height: 1.8;
            margin-bottom: 0.9rem;
            font-size: 0.965rem;
        }

        .c-content p:last-child {
            margin-bottom: 0;
        }

        .c-content ul {
            margin: 0.75rem 0;
            padding-left: 1.5rem;
        }

        .c-content li {
            margin-bottom: 0.55rem;
            color: var(--ink-mid);
            line-height: 1.7;
            font-size: 0.965rem;
        }

        .c-content a {
            color: var(--primary);
        }

        /* NAV BUTTONS */
        .nav-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 4rem;
            flex-wrap: wrap;
        }

        .nav-button {
            padding: 0.85rem 2.2rem;
            font-size: 0.95rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition-smooth);
            min-width: 160px;
            letter-spacing: 0.03em;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 4px 15px rgba(44, 95, 122, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .nav-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(44, 95, 122, 0.35);
        }

        .nav-button.prev {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid rgba(44, 95, 122, 0.3);
            box-shadow: none;
        }

        .nav-button.prev:hover {
            background: rgba(44, 95, 122, 0.06);
            border-color: var(--primary);
        }

        /* TEAM */
        .tp-page {
            max-width: 1080px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        .tp-masthead {
            padding-bottom: 2rem;
            margin-bottom: 4rem;
            text-align: center;
        }

        .tp-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.8rem;
            font-weight: 400;
            color: var(--primary);
            font-style: italic;
            letter-spacing: 0.02em;
            line-height: 1.1;
        }

        .tp-section {
            margin-bottom: 5rem;
        }

        .tp-section-head {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .tp-section-inst {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--primary);
            font-style: italic;
            letter-spacing: 0.02em;
            line-height: 1.1;
        }

        .tp-section-label {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 0.14em;
            background: var(--bg);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }

        .tp-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2.5rem 1.5rem;
        }

        .tp-card {
            width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .tp-avatar {
            width: 100%;
            aspect-ratio: 1;
            margin-bottom: 0.25rem;
            overflow: hidden;
            background: var(--bg-light);
        }

        .tp-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(10%) contrast(1.05);
        }

        .tp-avatar-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
            font-size: 2rem;
            font-weight: 500;
            color: var(--white);
        }

        .tp-info {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-top: 1px solid var(--rule);
            padding-top: 0.5rem;
            flex-grow: 1;
        }

        .tp-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--primary);
            line-height: 1.25;
            margin-bottom: 0.15rem;
            font-style: italic;
        }

        .tp-role {
            font-size: 0.8rem;
            color: var(--text-medium);
            line-height: 1.4;
        }

        .tp-focus {
            font-size: 0.75rem;
            color: var(--text-light);
            line-height: 1.35;
            margin-top: 0.2rem;
        }

        /* ANIMATIONS */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        /* HAMBURGER */
        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 6px;
            background: none;
            border: none;
        }

        .nav-hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--blue);
            border-radius: 2px;
            transition: all 0.3s;
        }

        /* RESPONSIVE */
        @media(max-width:860px) {
            .nav-links {
                display: none;
            }

            .nav-hamburger {
                display: flex !important;
            }

            .nav-content {
                padding: 0 1.25rem;
            }

            .nav-links.open {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 62px;
                left: 0;
                right: 0;
                background: white;
                border-bottom: 1px solid var(--border);
                box-shadow: 0 12px 32px rgba(26, 74, 107, 0.1);
                padding: 0.5rem 0 1rem;
                gap: 0;
                animation: fadeIn 0.2s ease;
            }

            .nav-item {
                width: 100%;
            }

            .nav-link {
                font-size: 0.95rem;
                padding: 0.75rem 1.5rem;
                justify-content: space-between;
                border-bottom: 1px solid rgba(26, 74, 107, 0.05);
                background: none !important;
            }

            .nav-link:hover {
                background: rgba(26, 74, 107, 0.04) !important;
            }

            .nav-dropdown {
                position: static !important;
                opacity: 1 !important;
                visibility: visible !important;
                transform: none !important;
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                min-width: unset !important;
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                background: rgba(26, 74, 107, 0.025) !important;
            }

            .nav-dropdown-item {
                padding: 0.6rem 1.5rem 0.6rem 2.5rem;
                font-size: 0.875rem;
                border-radius: 0;
                border-bottom: 1px solid rgba(26, 74, 107, 0.04);
            }

            .nav-sub-dropdown {
                position: static !important;
                opacity: 1 !important;
                visibility: visible !important;
                transform: none !important;
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                min-width: unset !important;
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                background: rgba(26, 74, 107, 0.04) !important;
            }

            .nav-sub-dropdown .nav-dropdown-item {
                padding-left: 3.5rem;
                font-size: 0.84rem;
            }

            .nav-sub-item>.nav-dropdown-item::after {
                content: '';
            }
        }

        @media(max-width:700px) {
            .c-block {
                grid-template-columns: 1fr;
            }

            .c-label {
                padding: 1.25rem 1.5rem 0.75rem;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .c-content {
                padding: 1.25rem 1.5rem;
            }

            .content-page h1 {
                font-size: 2.6rem;
            }

            .content-page {
                padding: 7rem 1rem 3rem;
            }
        }

        @media(max-width:800px) {
            .tp-card {
                width: calc(33.333% - 1rem);
            }
        }

        @media(max-width:500px) {
            .tp-title {
                font-size: 2.5rem;
            }

            .tp-card {
                width: calc(50% - 0.75rem);
            }

            .tp-page {
                padding: 7rem 1rem 3rem;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        /* ─── SHARED PRIMITIVES ─── */

        function Block({ label, children, full }) {
            if (full) return (
                <div className="c-block full"><div className="c-content">{children}</div></div>
            );
            return (
                <div className="c-block">
                    <div className="c-label"><h2>{label}</h2></div>
                    <div className="c-content">{children}</div>
                </div>
            );
        }

        const ImgCard = ({ src, alt, caption }) => (
            <figure style={{ margin: 0, overflow: 'hidden', boxShadow: '0 4px 18px rgba(44,95,122,0.13)', background: 'white' }}>
                {src
                    ? <img src={src} alt={alt} style={{ width: '100%', objectFit: 'cover', display: 'block' }} />
                    : <div style={{ width: '100%', height: '220px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-light)', fontStyle: 'italic', background: 'var(--bg-light)', border: '2px dashed var(--border)' }}>[{alt}]</div>
                }
                <figcaption style={{ padding: '0.65rem 1rem', fontSize: '0.82rem', color: 'var(--text-medium)', fontStyle: 'italic', borderTop: '1px solid rgba(44,95,122,0.08)', background: 'white' }}>{caption}</figcaption>
            </figure>
        );

        function ImageCarousel({ images }) {
            const [idx, setIdx] = useState(0);
            const prev = () => setIdx(i => i === 0 ? images.length - 1 : i - 1);
            const next = () => setIdx(i => (i + 1) % images.length);
            const bs = side => ({ position: 'absolute', top: '50%', [side]: '1.2rem', transform: 'translateY(-50%)', background: 'rgba(255,255,255,0.15)', backdropFilter: 'blur(8px)', border: '1px solid rgba(255,255,255,0.3)', width: '44px', height: '44px', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', zIndex: 10, fontSize: '1.2rem', color: 'white', transition: 'all 0.2s' });
            return (
                <div style={{ position: 'relative', width: '100%', margin: '2rem 0', overflow: 'hidden', boxShadow: 'var(--shadow-md)', background: '#0a111a', userSelect: 'none' }}>
                    <div style={{ position: 'relative', width: '100%', aspectRatio: '16/9', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                        <img key={idx} src={images[idx].src} alt={images[idx].caption} style={{ width: '100%', height: '100%', objectFit: 'contain', display: 'block', animation: 'fadeIn 0.5s ease-in-out' }} />
                        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: '60%', background: 'linear-gradient(to top,rgba(10,17,26,0.9) 0%,rgba(10,17,26,0) 100%)', pointerEvents: 'none' }} />
                    </div>
                    <button style={bs('left')} onClick={prev} onMouseOver={e => e.currentTarget.style.background = 'rgba(255,255,255,0.3)'} onMouseOut={e => e.currentTarget.style.background = 'rgba(255,255,255,0.15)'}>❮</button>
                    <button style={bs('right')} onClick={next} onMouseOver={e => e.currentTarget.style.background = 'rgba(255,255,255,0.3)'} onMouseOut={e => e.currentTarget.style.background = 'rgba(255,255,255,0.15)'}>❯</button>
                    <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '1.5rem 2rem', zIndex: 5 }}>

        /* ─── CLIMATE CHANGE PAGE ─── */
        function ClimateChangePage() {
            return (
                <>
                    <div className="content-page">
                        <h1>Climate and Weather</h1>
                        <div className="c-group">
                            <Block full>
                                <p>For over two centuries, scientists have been advancing our understanding of the effects of greenhouse gas emissions on the earth's climate. The levels of noxious greenhouse gases — carbon dioxide, methane, and nitrous oxide — continue to increase to dangerous levels; the rate of increase is also increasing. This is unprecedented and dangerous.</p>
                                <p>The most important reason for this is the continued burning of fossil fuels. Despite advances in renewable energy such as solar and wind technologies, fossil fuel use worldwide is still increasing. Forests and oceans have long countered the rise in atmospheric carbon dioxide by absorbing it. But the forests are disappearing due to human destruction and wildfires. The oceans are becoming acidified.</p>
                                <p>The result is planetary global warming, which is happening at a dangerous rate. There are many consequences to this. One dramatic result is that ice caps and glaciers at the poles are shrinking. Large chunks could soon be falling off, causing meters of sea level rise across the planet. Global warming also causes extreme weather events such as hurricanes, typhoons, floods, heat waves, droughts, and wildfires. The number and intensity of such extreme weather events increase steadily, causing more death, destruction, homelessness, migration, and stress.</p>
                                <div style={{ margin: '2rem 0' }}>
                                    <ImgCard
                                        src="https://res.cloudinary.com/dd4p37hyq/image/upload/v1773722783/Impact_of_climate_change_on_extfreme_weather_Screenshot_sdci7q.png"
                                        alt="Impact of climate change on extreme weather"
                                        caption="Impact of climate change on extreme weather events"
                                    />
                                </div>
                                <p>
                                    <a href="https://www.carbonbrief.org/" target="_blank" rel="noopener noreferrer">carbonbrief.org</a>
                                    <span style={{ margin: '0 0.75rem', color: 'var(--text-light)' }}>·</span>
                                    <a href="https://www.worldweatherattribution.org/" target="_blank" rel="noopener noreferrer">worldweatherattribution.org</a>
                                </p>
                                <p style={{ marginTop: '1rem' }}>Our research and this website document cases and methods for mobilizing individual and community action by demonstrating that inaction in the face of climate change will lead to more destruction from extreme weather, whereas there are doable actions by both individuals and communities that will make us safer.</p>
                            </Block>
                        </div>

                    </div>
                    <Footer />
                </>
            );
        }



        /* ─── METHODOLOGY ─── */
        function MethodologyPage() {
            return (
                <>
                    <div className="content-page">
                        <h1>Our Methodology</h1>
                        <div className="c-group">
                            <Block label="Vision">
                                <p>To build computer simulation models of extreme weather events and then translate them into accessible images and experiences. To help individuals and communities</p>
                                <ul style={{ listStyle: 'none', paddingLeft: '1.25rem', margin: '0.5rem 0 0.9rem' }}>
                                    <li style={{ marginBottom: '0.3rem', color: 'var(--ink-mid)', lineHeight: '1.8', fontSize: '0.965rem' }}><span style={{ color: 'var(--ink-light)', marginRight: '0.5rem' }}>a)</span>better understand past extreme weather events;</li>
                                    <li style={{ marginBottom: '0.3rem', color: 'var(--ink-mid)', lineHeight: '1.8', fontSize: '0.965rem' }}><span style={{ color: 'var(--ink-light)', marginRight: '0.5rem' }}>b)</span>imagine how future damage could be worse if nothing is done; and</li>
                                    <li style={{ marginBottom: '0.3rem', color: 'var(--ink-mid)', lineHeight: '1.8', fontSize: '0.965rem' }}><span style={{ color: 'var(--ink-light)', marginRight: '0.5rem' }}>c)</span>see how constructive actions could reduce the damage from future storms.</li>
                                </ul>
                                <p>To produce constructive change in the behaviour of individuals and more thoughtful and open policy deliberations by government.</p>
                            </Block>
                            <Block label="Approach">
                                <p>Well-designed images help people engage thoughtfully with critical issues. We therefore visualize extreme weather events — situations where climate change affects people most directly. Depictions of floods and fires show what neighborhoods have experienced, how damage could become worse, and how risks would be reduced if we act soon. What is novel is how we create experiences that portray the difference between action and inaction and use these to motivate and enable constructive change.</p>
                                <p>Our work integrates flood and fire modelling, data visualization, design, planning, and environmental psychology. We develop novel visualizations and immersive environments. Unlike other work, and to maximize impact, images are designed for lay audiences, portray local phenomena, are based on real data and validated models; are static and dynamic; and portray optimistic and pessimistic scenarios.</p>
                            </Block>
                            <Block label="Goals">
                                <ul>
                                    <li>Create more immersive experiences (3D imagery, hypermedia, games, extended reality, lively exhibits);</li>
                                    <li>Speed up modelling and visualization processes;</li>
                                    <li>Demonstrate experimentally that these experiences affect the climate change engagement, understanding, and actions of individuals; and</li>
                                    <li>Deliver insightful experiences of actual or possible extreme weather to make citizen groups more knowledgeable; enrich schools curricula with learning units and games; and help government agencies charged with climate-related policy to conduct more thoughtful and open deliberations.</li>
                                </ul>
                            </Block>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

        /* ─── FLOOD MODELLING ─── */
        function FloodModellingPage() {
            return (
                <>
                    <div className="content-page">
                        <h1>Modelling and Visualizing Floods</h1>
                        <div className="c-group">
                            <Block full>
                                <p>Our work proceeds as a series of case studies. The locations we study have experienced one or several instances of severe flooding and have gathered reliable data with which to calibrate and validate our models. The situations can be used to illustrate the difference in plausible future flooding based on the degree to which there is inaction (making future floods worse) or constructive actions (making the damage from future floods less severe).</p>
                                <p>This website reports on our first case studies, <a href="#don-river">flooding at the mouth of the Don River (Toronto)</a>, and <a href="#etobicoke">flooding of the Little Etobicoke Creek (Mississauga)</a>.</p>
                            </Block>
                            <Block label="Modelling Systems">
                                <p>Past flooding is reproduced mathematically by modelling the flood in one of a set of computer systems for doing this. Thus far, we have used in our work both <a href="https://www.esri.com/content/dam/esrisites/en-us/media/technical-papers/flood-simulation-arcgis-pro.pdf" target="_blank" rel="noopener noreferrer">ESRI ArcGIS</a> and the <a href="https://www.civilgeo.com/the-road-to-hec-ras/" target="_blank" rel="noopener noreferrer">U.S. Army's HEC-RAS</a>.</p>
                            </Block>
                            <Block label="Model Inputs">
                                <p>Data used as input to a flood model includes:</p>
                                <ul>
                                    <li>Topography;</li>
                                    <li>Land surface characteristics such as rivers and streams, dams and culverts;</li>
                                    <li>Underground streams and drainage systems; and</li>
                                    <li>Absorptive properties of structures on the ground such as building rooftops and parking lots.</li>
                                </ul>
                                <p>Models are driven by data on the water that comes from sources such as rainfall, tides, rising sea levels, and ocean surges. Models output descriptions of water flowing with varying velocities over landscapes over periods of time. If strong enough, these water flows are floods.</p>
                            </Block>
                            <Block label="Future Projections">
                                <p>Once we can reproduce past flooding, we can use the model to imagine, project, and visualize future climate scenarios.</p>
                                <p>Climate change continues to pump more greenhouse gases into the atmosphere and increase the earth's surface temperature. Rainfall becomes worse because there is more moisture in the atmosphere. Storms become worse and more unpredictable because of greater numbers of events such as rainstorms, hurricanes, typhoons, and tsunamis.</p>
                                <p>On the other hand, concrete actions can be undertaken. Some actions affect the speed of climate change. These include decreasing our reliance on fossil fuels, increasing the use of electric vehicles, slowing the destruction of forests, substituting electronic communications for travel, and eating less meat. Other actions are specific to flood prevention. These include reengineering rivers and how they flow; increasing the capacity of drainage systems; constructing barriers to the flow of water such as dams and levees; and modifying the absorptive qualities of upstream land features.</p>
                                <p>We believe (and will gather evidence as one of our research activities) that such modelling and visualizing exercises will give people a greater sense of agency with respect to climate change and the vagaries of extreme weather, and will be a tool to enable more open, thoughtful, and constructive policy deliberations.</p>
                            </Block>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

                            </Block>

                        { name: "Mike Wotton", title: "Dr., Canadian Forest Service", focus: "Fire ignition and behaviour modelling", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800615/toronto_MikeWotton_x4niez.jpg" },
                        { name: "Melanie Wheatley", title: "Dr., Ont. Ministry Natural Resources", focus: "Aviation Forest Fire & Emergency Services", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800618/ocadu_Melanie_zcjmue.jpg" },
                    ]
                },
                {
                    institution: "University of Toronto", label: "Students & Recent Grads", accent: "blue", members: [
                        { name: "Jacob Klimczak", title: "4th year, Computer Science", focus: "", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800616/toronto_Jacob_s90gc4.png", photoPos: "top center" },
                        { name: "Junyoung Seok", title: "1st year MASc, Computer Science", focus: "", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800617/toronto_Junyoung_sglz2i.png" },
                        { name: "Gregory Gismondi", title: "3rd year, Computer Science", focus: "", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800616/toronto_Gregory_ja9mjd.jpg" },
                        { name: "Aria Zheng", title: "3rd year, Comm. Culture, Info & Tech · UTM", focus: "", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800617/toronto_Aria_hncvxo.png" },
                        { name: "Amanda Leiva", title: "Recent MASc grad, Mech. & Ind. Engineering", focus: "", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800619/toronto_Amanda.jpg_prdrsl.png" },
                        { name: "Lisa Zhong", title: "4th year, Data Science", focus: "", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800619/toronto_Lisa_hyiiwq.jpg" },
                        { name: "Caroline Xu", title: "4th year, Computer Science", focus: "", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800617/toronto_caroline_gkaj3b.jpg" },
                        { name: "Akshata Kulkarni", title: "3rd year, Computer Science", focus: "", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800617/toronto_Alshata_nmmk7s.jpg" },
                        { name: "Claire Jaroonjetjumnong", title: "3rd year, Computer Science", focus: "", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800617/toronto_claire_xpevny.jpg" },
                        { name: "Michael Zhang", title: "3rd year, Math & Computer Science", focus: "", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800614/toronto_Michael_o9j6oa.jpg" },
                    ]
                },

            ];
            const avatarBg = a => a === 'green' ? 'linear-gradient(140deg,#c8e8dc 0%,#6ab89a 100%)' : 'linear-gradient(140deg,#c8dff0 0%,#5a9ec6 100%)';
            const initials = n => n.split(' ').slice(0, 2).map(w => w[0]).join('');
            return (
                <>
                    <div className="tp-page">
                        <div className="tp-masthead">
                            <div className="tp-title">Team Members</div>
                            <div style={{ fontSize: '0.9rem', color: 'var(--ink-mid)', maxWidth: '600px', lineHeight: '1.65', textAlign: 'center', marginTop: '1rem', margin: '1rem auto 0' }}>
                                A multidisciplinary team of researchers, designers, and scientists from universities across Canada.
                            </div>
                        </div>
                        {groups.map((g, gi) => (
                            <div key={gi} className="tp-section">
                                <div className="tp-section-head">
                                    <span className="tp-section-inst">{g.institution}</span>
                                    {g.label && <span className="tp-section-label">{g.label}</span>}
                                </div>
                                <div className="tp-grid">
                                    {g.members.map((m, mi) => (
                                        <div key={mi} className="tp-card">
                                            <div className="tp-info">
                                                <div className="tp-name">{m.name}</div>
                                                <div className="tp-role">{m.title}</div>
                                                {m.focus && <div className="tp-focus">{m.focus}</div>}
                                            </div>
                                            <div className="tp-avatar">
                                                <img src={m.photo} alt={m.name} style={{ objectPosition: m.photoPos || 'center' }} onError={e => { e.currentTarget.style.display = 'none'; e.currentTarget.nextSibling.style.display = 'flex'; }} />
                                                <div className="tp-avatar-fallback" style={{ background: avatarBg(g.accent), display: 'none' }}>{initials(m.name)}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                        <div className="nav-buttons" style={{ marginTop: '4rem' }}>
                            <button className="nav-button prev" onClick={onPrev}>← Back</button>
                            <button className="nav-button" onClick={onNext}>Methodology →</button>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

        /* ─── MISC PAGES ─── */
        function PartnersPage() {
            return (
                <>
                    <div className="content-page">
                        <h1>Partners</h1>
                        <div className="c-group">
                            <Block full>
                                <ul>
                                    <li><a href="https://www.dgp.toronto.edu/" target="_blank" rel="noopener noreferrer">Dynamic Graphics Project</a>, Department of Cities, and School of Cities, UofT</li>
                                    <li><a href="https://climatesmartlab.ca/" target="_blank" rel="noopener noreferrer">Climate Smart Lab, UPEI</a></li>
                                    <li>Departments of Psychology, <a href="https://socialsciences.viu.ca/psychology" target="_blank" rel="noopener noreferrer">VIU</a> and <a href="https://www.uvic.ca/socialsciences/psychology/index.php" target="_blank" rel="noopener noreferrer">University of Victoria</a></li>
                                    <li><a href="https://www.ocadu.ca/" target="_blank" rel="noopener noreferrer">Ontario College of Art and Design</a></li>
                                </ul>
                            </Block>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

        function SponsorsPage() {
            return (
                <>
                    <div className="content-page">
                        <h1>Sponsors</h1>
                        <div className="c-group">
                            <Block full>
                                <ul>
                                    <li>Holgan 8T8 Foundation</li>
                                    <li><a href="https://web.cs.toronto.edu/" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--primary)', textDecoration: 'underline' }}>Department of Computer Science</a>, University of Toronto</li>
                                    <li><a href="https://schoolofcities.utoronto.ca/" target="_blank" rel="noopener noreferrer" style={{ color: 'var(--primary)', textDecoration: 'underline' }}>School of Cities</a>, University of Toronto</li>
                                    <li>William T. Reeves and Ricki Blau</li>
                                    <li>John Baker</li>
                                    <li>Kim Davidson</li>
                                    <li>SideFX</li>
                                </ul>
                            </Block>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

        function ContactPage() {
            return (
                <>
                    <div className="content-page">
                        <h1>Contact</h1>
                        <div className="c-group">
                            <Block full>
                                <p>If you would like to learn more about our work, please feel free to reach out. We welcome inquiries from researchers, educators, policymakers, and members of the public who are interested in climate change visualization and extreme weather modelling.</p>
                                <p>You can contact us by email at: <a href="mailto:ronald.baecker@utoronto.ca" style={{ color: 'var(--primary)', fontWeight: '500' }}>ronald.baecker@utoronto.ca</a></p>
                            </Block>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

        function ComingSoonPage({ title }) {
            return (
                <>
                    <div className="content-page">
                        <h1>{title}</h1>
                        <div className="c-group">
                            <Block full>
                                <p style={{ fontSize: '1.1rem', color: 'var(--text-medium)', textAlign: 'center', padding: '2rem 0' }}>This section is currently under development.</p>
                                <p style={{ textAlign: 'center' }}>Please check back later for updates as we continue our research and publish new content.</p>
                            </Block>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

        /* ─── APP ─── */
        function App() {
            const [page, setPage] = useState('home');
            React.useEffect(() => {
                const handle = () => { const h = window.location.hash.replace('#', '') || 'home'; setPage(h); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                window.addEventListener('hashchange', handle);
                handle();
                return () => window.removeEventListener('hashchange', handle);
            }, []);
            const goTo = p => { window.location.hash = p; };
            return (
                <div>
                    <Navigation />
                    {page === 'home' && <LandingPage />}
                    {page === 'climate-change' && <ClimateChangePage />}

                    {page === 'methodology' && <MethodologyPage />}
                    {page === 'flood-modelling' && <FloodModellingPage />}
                    {page === 'wildfire-modelling' && <ComingSoonPage title="Modelling and Visualizing Wildfires" />}
                    {page === 'don-river' && <DonRiver />}
                    {page === 'don-river-problem' && <DonRiverProblem />}
                    {page === 'don-river-solution' && <DonRiverSolution />}
                    {page === 'don-river-viz' && <DonRiverViz />}
                    {page === 'etobicoke' && <Etobicoke />}
                    {page === 'etobicoke-problem' && <EtobicokeProblem />}
                    {page === 'etobicoke-solution' && <EtobicokeSolution />}
                    {page === 'etobicoke-viz' && <EtobicokeViz />}
                    {page === 'north-rustico' && <ComingSoonPage title="North Rustico Flooding (Prince Edward Island)" />}
                    {page === 'fort-mcmurray' && <ComingSoonPage title="Fort McMurray Wildfire (Alberta)" />}
                    {page === 'team' && <TeamPage onNext={() => goTo('methodology')} onPrev={() => goTo('etobicoke')} />}
                    {page === 'partners' && <PartnersPage />}
                    {page === 'sponsors' && <SponsorsPage />}
                    {page === 'contact' && <ContactPage />}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
