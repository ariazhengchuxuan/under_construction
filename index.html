<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envisioning Climate Futures</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <link

        rel="stylesheet">

    <style>
        :root {
            --blue: #163f59;
            --blue-mid: #215a7f;
            --blue-light: #4889b0;
            --blue-pale: #eaf1f5;
            --green: #1d5b43;
            --green-light: #358c6b;
            --green-pale: #e2f0ea;
            --white: #ffffff;
            --bg: #f9fbfd;
            --ink: #111e26;
            --ink-mid: #3d505c;
            --ink-light: #7c93a3;
            --rule: rgba(22, 63, 89, 0.08);
            --border: rgba(22, 63, 89, 0.08);
            --shadow-sm: 0 2px 8px rgba(22, 63, 89, 0.04);
            --shadow-md: 0 8px 30px rgba(22, 63, 89, 0.08);
            --shadow-lg: 0 20px 50px rgba(22, 63, 89, 0.12);
            --radius-md: 0px;
            --radius-lg: 0px;
            --primary: var(--blue);
            --primary-mid: var(--blue-mid);
            --secondary: var(--blue-light);
            --accent: #b54a16;
            --accent-light: #d6642d;
            --hope-green: var(--green);
            --teal: #1f6464;
            --water: #78bdd6;
            --warm: #b87b2e;
            --sky: #5d9fba;
            --bg-light: var(--bg);
            --bg-white: var(--white);
            --text: var(--ink);
            --text-medium: var(--ink-mid);
            --text-light: var(--ink-light);
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .text-link {
            color: var(--primary);
            text-decoration: underline;
            text-decoration-color: rgba(22, 63, 89, 0.3);
            text-underline-offset: 3px;
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .text-link:hover {
            color: var(--accent);
            text-decoration-color: var(--accent);
        }

        .text-link.ext {
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .text-link.ext::after {
            content: "↗";
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.85em;
            font-weight: 700;
            opacity: 0.55;
            margin-left: 1px;
            transform: translateY(-1px);
        }

        /* Image Carousel */
        .img-carousel {
            position: relative;
            width: 100%;
            margin: 2rem 0;
            box-shadow: var(--shadow-md);
            background: #0a111a;
            user-select: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .carousel-img-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
        }

        .carousel-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        .carousel-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(10, 17, 26, 0.9) 0%, rgba(10, 17, 26, 0) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            font-size: 1.2rem;
            color: white;
            transition: all 0.2s;
        }

        .carousel-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .carousel-btn.left {
            left: 1.2rem;
        }

        .carousel-btn.right {
            right: 1.2rem;
        }

        .carousel-text-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 2rem;
            z-index: 5;
        }

        .carousel-caption {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            font-family: 'DM Sans', sans-serif;
        }

        .carousel-desc {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            line-height: 1.5;
            max-width: 80%;
        }

        .carousel-counter {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .carousel-btn {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }

            .carousel-btn.left {
                left: 0.5rem;
            }

            .carousel-btn.right {
                right: 0.5rem;
            }

            .carousel-text-container {
                position: static;
                padding: 1.2rem 1rem;
            }

            .carousel-gradient {
                display: none;
            }

            .carousel-desc {
                max-width: 100%;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink);
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }

        h1,
        h2,
        h3 {
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            line-height: 1.15;
            letter-spacing: -0.01em;
        }

        img,
        video,
        figure {
            border-radius: 0 !important;
        }

        /* NAV */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .nav-brand-bar {
            background: rgba(244, 248, 251, 0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--rule);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 72px;
            position: relative;
        }

        .nav-logo {
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            line-height: 1.15;
            overflow: hidden;
            max-width: calc(100% - 60px);
            display: flex;
            flex-direction: column;
        }

        .nav-logo-line1 {
            font-size: 1.42rem;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
        }

        .nav-logo-line2 {
            font-size: 1.0rem;
            font-weight: 400;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
        }

        .nav-menu-bar {
            background: #0d2e45;
            border-bottom: 3px solid var(--accent);
        }

        .nav-menu-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: center;
            align-items: stretch;
        }

        .nav-links {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 0;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            font-size: 0.7rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0 1.15rem;
            height: 40px;
            white-space: nowrap;
            transition: var(--transition-smooth);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            border-bottom: 3px solid transparent;
            margin-bottom: -3px;
        }

        .nav-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.07);
            border-bottom-color: var(--accent);
        }

        .nav-link-arrow {
            font-size: 0.55rem;
            opacity: 0.55;
            transition: var(--transition-smooth);
            flex-shrink: 0;
        }

        .nav-item:hover .nav-link-arrow {
            transform: rotate(180deg);
            opacity: 1;
        }

        .nav-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-4px);
            background: white;
            min-width: 270px;
            box-shadow: 0 12px 40px rgba(26, 74, 107, 0.18), 0 2px 8px rgba(0, 0, 0, 0.06);
            border-top: 3px solid var(--accent);
            border-radius: 0 0 6px 6px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.18s, transform 0.18s, visibility 0.18s;
            padding: 0.4rem;
        }

        .nav-item:hover .nav-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .nav-dropdown-item {
            padding: 0.65rem 1rem;
            color: var(--text-medium);
            display: block;
            transition: all 0.15s;
            font-size: 0.68rem;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        .nav-dropdown-item:hover {
            background: rgba(26, 74, 107, 0.06);
            color: var(--primary);
            padding-left: 1.3rem;
        }

        .nav-sub-item {
            position: relative;
        }

        .nav-sub-item>.nav-dropdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-sub-item>.nav-dropdown-item::after {
            content: '›';
            font-size: 1rem;
            color: var(--text-light);
            margin-left: 0.5rem;
        }

        .nav-sub-dropdown {
            position: absolute;
            top: 0;
            left: 100%;
            margin-left: 4px;
            background: white;
            min-width: 220px;
            box-shadow: 0 12px 40px rgba(26, 74, 107, 0.14), 0 2px 8px rgba(0, 0, 0, 0.04);
            border-top: 3px solid var(--accent);
            border-radius: 0 0 6px 6px;
            opacity: 0;
            visibility: hidden;
            transform: translateX(-4px);
            transition: opacity 0.18s, transform 0.18s, visibility 0.18s;
            padding: 0.4rem;
        }

        .nav-sub-item:hover .nav-sub-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        /* FOOTER */
        .footer {
            background: linear-gradient(135deg, #0f2a3f 0%, #1a4a6b 60%, #0d3d5a 100%);
            padding: 3.5rem 2rem;
            margin-top: 5rem;
            position: relative;
            overflow: hidden;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(93, 183, 212, 0.12) 0%, transparent 70%);
        }

        .footer::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: 10%;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232, 98, 42, 0.1) 0%, transparent 70%);
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .footer-nav {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            flex-wrap: wrap;
        }

        .footer-nav-link {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.95rem;
            transition: color 0.2s;
            cursor: pointer;
        }

        .footer-nav-link:hover {
            color: var(--water);
        }

        .footer-copyright {
            text-align: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .footer-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            flex-wrap: wrap;
        }

        .footer-logos img {
            height: 52px;
            max-width: 140px;
            object-fit: contain;
            opacity: 0.6;
            filter: brightness(0) invert(1);
            transition: opacity 0.2s, transform 0.2s;
        }

        .footer-logos img:hover {
            opacity: 1;
            transform: scale(1.06);
        }

        /* LANDING */
        .landing {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6rem 2rem 4rem;
            background: var(--bg);
        }

        @media(max-width: 700px) {
            .landing-intro-grid {
                grid-template-columns: 1fr !important;
                gap: 2.5rem !important;
                padding: 3rem 1.25rem !important;
            }
        }

        /* ── UNIVERSAL CONTENT PAGE ── */
        .content-page {
            max-width: 1040px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
            padding-top: 115px;
        }

        .content-page-header {
            background: var(--primary);
            margin: 0 -2rem 2.5rem;
            padding: 3.5rem 2rem 3rem;
            position: relative;
        }

        .content-page h1 {
            font-family: 'DM Sans', sans-serif;
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.05;
            color: #ffffff;
            margin-bottom: 0;
        }

        .content-page h1::after {
            content: '';
            display: block;
            width: 44px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .page-location {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .page-location span {
            font-size: 0.88rem;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.04em;
            font-weight: 400;
            font-family: 'DM Sans', sans-serif;
        }

        /* Two-column block: label (left) + content (right) */
        .c-block {
            display: grid;
            grid-template-columns: 190px 1fr;
            border: none;
            border-bottom: 1px solid var(--rule, rgba(0, 0, 0, 0.07));
            background: transparent;
            box-shadow: none;
        }

        .c-block.full {
            grid-template-columns: 1fr;
        }

        .c-block:last-of-type,
        .c-group .c-block:last-child {
            border-bottom: none;
        }

        .c-group {
            margin-bottom: 0.5rem;
        }

        .c-group .c-block {
            border-bottom: 1px solid var(--rule, rgba(0, 0, 0, 0.07));
            margin-bottom: 0;
        }

        .c-group .c-block:last-child {
            border-bottom: none;
        }

        .c-label {
            padding: 2.5rem 1.5rem 2.5rem 0;
            border-right: none;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .c-label h2 {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.05rem;
            color: var(--primary);
            font-weight: 600;
            font-style: normal;
            text-transform: none;
            letter-spacing: -0.01em;
            line-height: 1.25;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.55rem;
        }

        .c-label h2::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .c-content {
            padding: 2.25rem 0 2.25rem 2.25rem;
            border-left: none;
        }

        .c-content p {
            color: var(--ink-mid);
            line-height: 1.8;
            margin-bottom: 0.9rem;
            font-size: 0.965rem;
        }

        .c-content p:last-child {
            margin-bottom: 0;
        }

        .c-content ul {
            margin: 0.75rem 0;
            padding-left: 1.5rem;
        }

        .c-content li {
            margin-bottom: 0.55rem;
            color: var(--ink-mid);
            line-height: 1.7;
            font-size: 0.965rem;
        }

        .c-content a {
            color: var(--primary);
        }

        /* NAV BUTTONS */
        .nav-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 4rem;
            flex-wrap: wrap;
        }

        .nav-button {
            padding: 0.85rem 2.2rem;
            font-size: 0.95rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--primary-mid));
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition-smooth);
            min-width: 160px;
            letter-spacing: 0.03em;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 4px 15px rgba(44, 95, 122, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .nav-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(44, 95, 122, 0.35);
        }

        .nav-button.prev {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid rgba(44, 95, 122, 0.3);
            box-shadow: none;
        }

        .nav-button.prev:hover {
            background: rgba(44, 95, 122, 0.06);
            border-color: var(--primary);
        }

        /* TEAM */
        .tp-page {
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
            padding-top: 115px;
        }

        .tp-masthead {
            background: var(--primary);
            margin: 0 -2rem 3rem;
            padding: 3.5rem 2rem 3.5rem;
            position: relative;
        }

        .tp-title {
            font-family: 'DM Sans', sans-serif;
            font-size: 3.2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.03em;
            line-height: 1.05;
            margin-bottom: 0;
        }

        .tp-title::after {
            content: '';
            display: block;
            width: 44px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .tp-subtitle {
            font-size: 0.88rem;
            color: rgba(255, 255, 255, 0.55);
            max-width: 560px;
            line-height: 1.65;
            font-weight: 400;
        }

        .tp-subtitle-below {
            display: none;
        }

        .tp-section {
            margin-bottom: 5rem;
        }

        .tp-section-head {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .tp-section-inst {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.9rem;
            font-weight: 300;
            color: var(--primary);
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .tp-section-label {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 0.14em;
            background: var(--bg);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }

        .tp-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2.5rem 1.5rem;
        }

        .tp-card {
            width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        .tp-avatar {
            width: 100%;
            aspect-ratio: 1;
            margin-bottom: 0.25rem;
            overflow: hidden;
            background: var(--bg-light);
        }

        .tp-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(10%) contrast(1.05);
        }

        .tp-avatar-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
            font-size: 2rem;
            font-weight: 500;
            color: var(--white);
        }

        .tp-info {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-top: 1px solid var(--rule);
            padding-top: 0.5rem;
            flex-grow: 1;
        }

        .tp-name {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--primary);
            line-height: 1.25;
            margin-bottom: 0.15rem;
        }

        .tp-role {
            font-size: 0.8rem;
            color: var(--text-medium);
            line-height: 1.4;
        }

        .tp-focus {
            font-size: 0.75rem;
            color: var(--text-light);
            line-height: 1.35;
            margin-top: 0.2rem;
        }

        /* ── PAGE ENTER ANIMATIONS ── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(22px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {

        const { useState } = React;

        /* ─── SHARED PRIMITIVES ─── */

        function useInView(options = { threshold: 0.15 }) {
            const [isInView, setIsInView] = React.useState(false);
            const ref = React.useRef(null);
            React.useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsInView(true);
                        observer.disconnect();
                    }
                }, options);
                if (ref.current) observer.observe(ref.current);
                return () => { if (observer) observer.disconnect(); };
            }, []);
            return [ref, isInView];
        }

        function FadeInUp({ children, delay = 0, style = {} }) {
            const [ref, isInView] = useInView();
            return (
                <div ref={ref} style={{ opacity: isInView ? 1 : 0, transform: isInView ? 'translateY(0)' : 'translateY(30px)', transition: `opacity 0.7s cubic-bezier(0.25, 0.8, 0.25, 1) ${delay}s, transform 0.7s cubic-bezier(0.25, 0.8, 0.25, 1) ${delay}s`, ...style }}>
                    {children}
                </div>
            );
        }


        function Block({ label, children, full }) {

                    <div className="c-label"><h2>{label}</h2></div>
                    <div className="c-content">{children}</div>
                </div>

        function ExpandableImage({ src, alt, containerStyle, ...props }) {

            const close = (e) => { e.stopPropagation(); setExpanded(false); setZoomed(false); };
            const toggleZoom = (e) => { e.stopPropagation(); setZoomed(!zoomed); };

            return (
                <div style={{ position: 'relative', width: '100%', ...containerStyle }}>
                    <img src={src} alt={alt} {...props} style={{ ...props.style, cursor: 'pointer' }} onClick={() => setExpanded(true)} />

                        <span>⛶</span> Expand

                            <div style={{ width: zoomed ? 'max-content' : '100%', height: zoomed ? 'max-content' : '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: zoomed ? '0' : 'auto', padding: zoomed ? '50px' : '0' }}>
                                <img src={src} alt={alt} style={{ maxWidth: zoomed ? 'none' : '90%', maxHeight: zoomed ? 'none' : '90%', objectFit: 'contain', boxShadow: '0 20px 50px rgba(0,0,0,0.5)', borderRadius: '8px', cursor: zoomed ? 'zoom-out' : 'zoom-in', transition: 'all 0.3s ease' }} onClick={toggleZoom} />
                            </div>

                            <button onClick={close} style={{ position: 'fixed', top: '2rem', right: '2rem', background: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.2)', borderRadius: '50%', width: '48px', height: '48px', cursor: 'pointer', fontSize: '1.5rem', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all 0.2s', backdropFilter: 'blur(4px)', zIndex: 100000 }} onMouseOver={e => e.currentTarget.style.background = 'rgba(255,255,255,0.2)'} onMouseOut={e => e.currentTarget.style.background = 'rgba(255,255,255,0.1)'}>✕</button>

        /* ─── FLOOD MODELLING ─── */
        function FloodModellingPage() {
            return (
                <>
                    <div className="content-page">
                        <div className="content-page-header"><h1>Flood Modelling</h1></div>
                        <div className="c-group">
                            <Block full>
                                <p>Our work proceeds as a series of case studies. The locations we study have experienced one or several instances of severe flooding and have gathered reliable data with which to calibrate and validate our models.</p>
                                <div style={{ background: 'var(--white)', border: '1px solid var(--border)', padding: '1.25rem 1.5rem', borderRadius: '12px', margin: '1.5rem 0', boxShadow: '0 4px 18px rgba(44,95,122,0.04)' }}>
                                    <p style={{ margin: 0, color: 'var(--ink-mid)' }}>The situations can be used to illustrate the difference in plausible future flooding based on the degree to which there is <strong><span style={{ color: 'var(--accent)' }}>inaction</span> (making future floods worse)</strong> or <strong><span style={{ color: 'var(--primary)' }}>constructive actions</span> (making the damage from future floods less severe)</strong>.</p>
                                </div>
                                <p>This website reports on our first case studies, <a className="text-link" href="#don-river">flooding at the mouth of the Don River (Toronto)</a>, and <a className="text-link" href="#etobicoke">flooding of the Little Etobicoke Creek (Mississauga)</a>.</p>
                            </Block>
                            <Block label="Modelling Systems">
                                <p>Past flooding is reproduced mathematically by modelling the flood in one of a set of computer systems for doing this. Thus far, we have used in our work both <a className="text-link ext" href="https://www.esri.com/content/dam/esrisites/en-us/media/technical-papers/flood-simulation-arcgis-pro.pdf" target="_blank" rel="noopener noreferrer">ESRI ArcGIS</a> and the <a className="text-link ext" href="https://www.civilgeo.com/the-road-to-hec-ras/" target="_blank" rel="noopener noreferrer">U.S. Army's HEC-RAS</a>.</p>
                            </Block>
                            <Block label="Model Inputs">
                                <p>Data used as input to a flood model includes:</p>
                                <div style={{ background: '#f5f8fa', borderRadius: '10px', padding: '1rem 1.5rem', marginBottom: '1.5rem' }}>
                                    <ul style={{ margin: 0 }}>
                                        <li>Topography;</li>
                                        <li>Land surface characteristics such as rivers and streams, dams and culverts;</li>
                                        <li>Underground streams and drainage systems; and</li>
                                        <li>Absorptive properties of structures on the ground such as building rooftops and parking lots.</li>
                                    </ul>
                                </div>
                                <p>Models are driven by data on the water that comes from sources such as rainfall, tides, rising sea levels, and ocean surges. Models output descriptions of water flowing with varying velocities over landscapes over periods of time.</p>
                                <p><strong>If strong enough, these water flows are floods.</strong></p>
                            </Block>
                            <Block label="Future Projections">
                                <p>Once we can reproduce past flooding, we can use the model to imagine, project, and visualize future climate scenarios.</p>
                                <p>Climate change continues to pump more greenhouse gases into the atmosphere and increase the earth's surface temperature. Rainfall becomes worse because there is more moisture in the atmosphere. Storms become worse and more unpredictable because of greater numbers of events such as rainstorms, hurricanes, typhoons, and tsunamis.</p>
                                <p>On the other hand, concrete actions can be undertaken. Some actions affect the speed of climate change. These include decreasing our reliance on fossil fuels, increasing the use of electric vehicles, slowing the destruction of forests, substituting electronic communications for travel, and eating less meat. Other actions are specific to flood prevention. These include reengineering rivers and how they flow; increasing the capacity of drainage systems; constructing barriers to the flow of water such as dams and levees; and modifying the absorptive qualities of upstream land features.</p>
                                <p>We believe (and will gather evidence as one of our research activities) that such modelling and visualizing exercises will give people a greater sense of agency with respect to climate change and the vagaries of extreme weather, and will be a tool to enable more open, thoughtful, and constructive policy deliberations.</p>
                            </Block>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

        function DonRiverProblem() {
            return (
                <>
                    <div className="content-page">

                        </div>
                        <SubNav items={donItems} active="don-river-problem" />
                        <div className="c-group">
                            <Block label="The Problem">
                                <p>The Don River drains an area of about 1,200 square kilometers in southern Ontario, falling about 250 meters in the 60 kilometers from its source as it makes its way into Lake Ontario.</p>
                                <div style={{ margin: '1.5rem 0', maxWidth: '60%' }}><ImgCard src="https://res.cloudinary.com/dd4p37hyq/image/upload/v1772705589/Don_Watershed_Screenshot_tmddpm.png" alt="Watershed" caption="Don River watershed" /></div>

                                <p>In 1886, the city of Toronto initiated the <a className="text-link ext" href="https://jenniferbonnell.com/books-publications/reclaiming-the-don/" target="_blank" rel="noopener noreferrer">"Don River Improvement Plan"</a>. Concerns that led to this Plan were threefold: public health dangers from urban wastes including sewage in the river, damage from floods, and impediments to Lake Ontario shipping from silt build-up erroneously attributed to the river. The plan was to widen, deepen, and straighten the river channel in the last 2 kilometers before it reached the lake. Additional benefits from the plan were intended to be allowing ships to come up the river and railroad tracks on both banks of the river.</p>

                        { name: "Claire Jaroonjetjumnong", title: "3rd year, Computer Science", focus: "", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800617/toronto_claire_xpevny.jpg" },
                        { name: "Michael Zhang", title: "3rd year, Math & Computer Science", focus: "", photo: "https://res.cloudinary.com/dd4p37hyq/image/upload/v1773800614/toronto_Michael_o9j6oa.jpg" },
                    ]
                },
            ];
            const avatarBg = a => a === 'green' ? 'linear-gradient(140deg,#c8e8dc 0%,#6ab89a 100%)' : 'linear-gradient(140deg,#c8dff0 0%,#5a9ec6 100%)';
            const initials = n => n.split(' ').slice(0, 2).map(w => w[0]).join('');
            return (
                <>
                    <div className="tp-page">
                        <div className="tp-masthead">
                            <div className="tp-title">Team Members</div>
                            <div className="tp-subtitle">A multidisciplinary team of researchers, designers, and scientists from universities across Canada.</div>
                        </div>
                        {groups.map((g, gi) => (
                            <div key={gi} className="tp-section">
                                <div className="tp-section-head">
                                    <span className="tp-section-inst">{g.institution}</span>
                                    {g.label && <span className="tp-section-label">{g.label}</span>}
                                </div>
                                <div className="tp-grid">
                                    {g.members.map((m, mi) => (
                                        <div key={mi} className="tp-card">
                                            <div className="tp-info">
                                                <div className="tp-name">{m.name}</div>
                                                <div className="tp-role">{m.title}</div>
                                                {m.focus && <div className="tp-focus">{m.focus}</div>}
                                            </div>
                                            <div className="tp-avatar">
                                                <img src={m.photo} alt={m.name} style={{ objectPosition: m.photoPos || 'center' }} onError={e => { e.currentTarget.style.display = 'none'; e.currentTarget.nextSibling.style.display = 'flex'; }} />
                                                <div className="tp-avatar-fallback" style={{ background: avatarBg(g.accent), display: 'none' }}>{initials(m.name)}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                    <Footer />
                </>
            );
        }

        /* ─── PARTNERS ─── */
        function PartnersPage() {
            const partners = [
                { name: 'Dynamic Graphics Project, University of Toronto', url: 'https://www.dgp.toronto.edu/' },
                { name: 'School of Cities, University of Toronto', url: 'https://schoolofcities.utoronto.ca/' },
                { name: 'Climate Smart Lab, UPEI', url: 'https://climatesmartlab.ca/' },
                { name: 'Departments of Psychology, VIU', url: 'https://socialsciences.viu.ca/psychology' },
                { name: 'Department of Psychology, University of Victoria', url: 'https://www.uvic.ca/socialsciences/psychology/index.php' },
                { name: 'Ontario College of Art and Design', url: 'https://www.ocadu.ca/' },
            ];
            return (
                <>
                    <div className="content-page">
                        <div className="content-page-header"><h1>Partners</h1></div>
                        <div className="c-group">
                            <Block full>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                    {partners.map((p, i) => (
                                        <a key={i} href={p.url} target="_blank" rel="noopener noreferrer"
                                            style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '1rem 1.25rem', background: 'white', border: '1px solid var(--border)', borderLeft: '3px solid var(--accent)', textDecoration: 'none', color: 'var(--ink)', transition: 'all 0.2s', gap: '1rem' }}
                                            onMouseOver={e => { e.currentTarget.style.borderLeftColor = 'var(--primary)'; e.currentTarget.style.background = 'var(--blue-pale)'; }}
                                            onMouseOut={e => { e.currentTarget.style.borderLeftColor = 'var(--accent)'; e.currentTarget.style.background = 'white'; }}>
                                            <span style={{ fontSize: '0.975rem', fontWeight: '500', color: 'var(--primary)', fontFamily: "'DM Sans', sans-serif" }}>{p.name}</span>
                                            <svg style={{ flexShrink: 0, opacity: 0.35 }} width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="7" y1="17" x2="17" y2="7" /><polyline points="7 7 17 7 17 17" /></svg>
                                        </a>
                                    ))}
                                </div>
                            </Block>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

        /* ─── SPONSORS ─── */
        function SponsorsPage() {
            const institutional = [
                { name: 'Holgan 8T8 Foundation', url: null },
                { name: 'Department of Computer Science, University of Toronto', url: 'https://web.cs.toronto.edu/' },
                { name: 'School of Cities, University of Toronto', url: 'https://schoolofcities.utoronto.ca/' },
                { name: 'SideFX', url: 'https://www.sidefx.com/' },
            ];
            const individual = [
                { name: 'William T. Reeves and Ricki Blau' },
                { name: 'John Baker' },
                { name: 'Kim Davidson' },
            ];
            const Row = ({ name, url }) => (
                <div
                    style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '1rem 1.25rem', background: 'white', border: '1px solid var(--border)', borderLeft: '3px solid var(--primary)', gap: '1rem', cursor: url ? 'pointer' : 'default', transition: 'all 0.2s' }}
                    onClick={() => url && window.open(url, '_blank')}
                    onMouseOver={e => { if (url) { e.currentTarget.style.borderLeftColor = 'var(--accent)'; e.currentTarget.style.background = 'var(--blue-pale)'; } }}
                    onMouseOut={e => { e.currentTarget.style.borderLeftColor = 'var(--primary)'; e.currentTarget.style.background = 'white'; }}>
                    <span style={{ fontSize: '0.975rem', fontWeight: '500', color: 'var(--primary)', fontFamily: "'DM Sans', sans-serif" }}>{name}</span>
                    {url && <svg style={{ flexShrink: 0, opacity: 0.35 }} width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><line x1="7" y1="17" x2="17" y2="7" /><polyline points="7 7 17 7 17 17" /></svg>}
                </div>
            );
            return (
                <>
                    <div className="content-page">
                        <div className="content-page-header"><h1>Sponsors</h1></div>
                        <div className="c-group">
                            <Block label="Institutional">
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                    {institutional.map((s, i) => <Row key={i} name={s.name} url={s.url || null} />)}
                                </div>
                            </Block>
                            <Block label="Individual">
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                    {individual.map((s, i) => <Row key={i} name={s.name} url={null} />)}
                                </div>
                            </Block>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

        function ContactPage() {
            return (
                <>
                    <div className="content-page">
                        <div className="content-page-header"><h1>Contact</h1></div>
                        <div className="c-group">
                            <Block full>
                                <p>If you would like to learn more about our work, please feel free to reach out. We welcome inquiries from researchers, educators, policymakers, and members of the public who are interested in climate change visualization and extreme weather modelling.</p>
                                <p>You can contact us by email at: <a className="text-link" href="mailto:ronald.baecker@utoronto.ca">ronald.baecker@utoronto.ca</a></p>
                            </Block>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

        /* ─── EVENTS ─── */
        function EventsPage() {
            return (
                <>
                    <div className="content-page">
                        <div className="content-page-header"><h1>Events</h1></div>
                        <div className="c-group">
                            <Block label="Sustainability Week">
                                <p>Our team participated in <strong>Sustainability Week</strong>, showcasing our climate visualization work and engaging with students, faculty, and community members about the impacts of extreme weather and the importance of climate action.</p>
                                <div style={{ margin: '1.5rem 0' }}>
                                    <figure style={{ margin: 0, overflow: 'hidden', boxShadow: '0 4px 18px rgba(44,95,122,0.13)', background: 'white' }}>
                                        <ExpandableImage
                                            src="https://res.cloudinary.com/dd4p37hyq/image/upload/v1775444503/sustainability_week_qes9zj.jpg"
                                            alt="Sustainability Week event"
                                            style={{ width: '100%', display: 'block', objectFit: 'cover' }}
                                        />
                                        <figcaption style={{ padding: '0.65rem 1rem', fontSize: '0.82rem', color: 'var(--text-medium)', fontStyle: 'italic', borderTop: '1px solid rgba(44,95,122,0.08)', background: 'white' }}>
                                            Envisioning Climate Futures at Sustainability Week
                                        </figcaption>
                                    </figure>
                                </div>
                                <p>Events like these are an important part of our mission — bringing scientific insights about climate change and extreme weather directly to the public through accessible, engaging experiences.</p>
                            </Block>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

        function ComingSoonPage({ title }) {
            return (
                <>
                    <div className="content-page">
                        <div className="content-page-header"><h1>{title}</h1></div>
                        <div className="c-group">
                            <Block full>
                                <p style={{ fontSize: '1.1rem', color: 'var(--text-medium)', textAlign: 'center', padding: '2rem 0' }}>This section is currently under development.</p>
                                <p style={{ textAlign: 'center' }}>Please check back later for updates as we continue our research and publish new content.</p>
                            </Block>
                        </div>
                    </div>
                    <Footer />
                </>
            );
        }

        /* ─── APP ─── */
        function App() {
            const [page, setPage] = useState('home');
            React.useEffect(() => {
                const handle = () => { const h = window.location.hash.replace('#', '') || 'home'; setPage(h); window.scrollTo({ top: 0, behavior: 'smooth' }); };
                window.addEventListener('hashchange', handle);
                handle();
                return () => window.removeEventListener('hashchange', handle);
            }, []);
            const goTo = p => { window.location.hash = p; };
            return (
                <div>
                    <Navigation />
                    {page === 'home' && <LandingPage />}
                    {page === 'climate-change' && <ClimateChangePage />}
                    {page === 'methodology' && <MethodologyPage />}
                    {page === 'flood-modelling' && <FloodModellingPage />}
                    {page === 'wildfire-modelling' && <ComingSoonPage title="Wildfire Modelling" />}
                    {page === 'don-river' && <DonRiver />}
                    {page === 'don-river-problem' && <DonRiverProblem />}
                    {page === 'don-river-solution' && <DonRiverSolution />}
                    {page === 'don-river-viz' && <DonRiverViz />}
                    {page === 'etobicoke' && <Etobicoke />}
                    {page === 'etobicoke-problem' && <EtobicokeProblem />}
                    {page === 'etobicoke-solution' && <EtobicokeSolution />}
                    {page === 'etobicoke-viz' && <EtobicokeViz />}
                    {page === 'north-rustico' && <ComingSoonPage title="North Rustico Flooding (Prince Edward Island)" />}
                    {page === 'fort-mcmurray' && <ComingSoonPage title="Fort McMurray Wildfire (Alberta)" />}
                    {page === 'team' && <TeamPage onNext={() => goTo('methodology')} onPrev={() => goTo('etobicoke')} />}
                    {page === 'partners' && <PartnersPage />}
                    {page === 'sponsors' && <SponsorsPage />}
                    {page === 'contact' && <ContactPage />}
                    {page === 'events' && <EventsPage />}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
